<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Reimagined | IPREU Digital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            margin: 0;
            overflow: hidden;
        }
        .error-container {
            text-align: center;
            padding: 4rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            max-width: 500px;
            z-index: 10;
        }
        h1 {
            font-size: 8rem;
            margin: 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin: 1rem 0 2.5rem;
        }
        .back-home {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .back-home:hover {
            transform: scale(1.05);
        }
    </style>
    <script>
        const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (currentTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>

<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div class="mesh-bg"></div>
    <div class="error-container reveal active">
        <h1>404</h1>
        <p>This utility seems to be misplaced. Let's get you back to the center of performance.</p>
        <a href="index.html" class="back-home magnetic">Back to Infrastructure</a>
    </div>
    
    <script>
        // Custom Cursor Logic
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        
        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;
            
            dot.style.transform = `translate(${posX}px, ${posY}px)`;
            outline.style.transform = `translate(${posX - 20}px, ${posY - 20}px)`;
        });

        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
        });

        window.addEventListener('mousedown', () => document.body.classList.add('cursor-click'));
        window.addEventListener('mouseup', () => document.body.classList.remove('cursor-click'));

        // Simple magnetic effect
        const magnetic = document.querySelector('.magnetic');
        magnetic.addEventListener('mousemove', (e) => {
            const bound = magnetic.getBoundingClientRect();
            const x = e.clientX - bound.left - bound.width / 2;
            const y = e.clientY - bound.top - bound.height / 2;
            magnetic.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        });
        magnetic.addEventListener('mouseleave', () => {
            magnetic.style.transform = '';
        });
    </script>
</body>
</html>
